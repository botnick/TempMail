# ============================================================================
# TempMail Platform — Docker Compose (Production)
# ============================================================================

services:
  # =========================================================================
  # DATA LAYER
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =========================================================================
  # SPAM FILTERING
  # =========================================================================
  rspamd:
    image: rspamd/rspamd:latest
    restart: always
    volumes:
      - rspamd_data:/var/lib/rspamd
      - ./docker/rspamd/local.d:/etc/rspamd/local.d:ro
    networks:
      - internal
    ports:
      - "127.0.0.1:11334:11334"

  # =========================================================================
  # MAIL PLANE (Go)
  # =========================================================================
  mail-edge:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: mail-edge
    restart: always
    ports:
      - "25:2525"
    environment:
      - REDIS_URL=${REDIS_URL}
      - RSPAMD_URL=http://rspamd:11333
      - RSPAMD_PASSWORD=${RSPAMD_PASSWORD:-}
      - LOG_FILE_PATH=stdout
    depends_on:
      redis:
        condition: service_healthy
      rspamd:
        condition: service_started
    networks:
      - internal

  # =========================================================================
  # API PLANE (Go Fiber)
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PANEL_PATH=${ADMIN_PANEL_PATH}
      - FRONTEND_URL=${FRONTEND_URL}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - LOG_FILE_PATH=stdout
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # =========================================================================
  # BACKGROUND WORKER (Go Asynq)
  # =========================================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - LOG_FILE_PATH=stdout
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rspamd_data:

networks:
  internal:
    driver: bridge

version: '3.8'

services:
  # =========================================================================
  # DATA LAYER
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    # No ports exposed — only accessible from internal network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - internal
    # No ports exposed — only accessible from internal network

  # =========================================================================
  # SPAM FILTERING
  # =========================================================================
  rspamd:
    image: rspamd/rspamd:latest
    restart: always
    volumes:
      - rspamd_data:/var/lib/rspamd
    networks:
      - internal
    # Controller UI only on localhost for admin
    ports:
      - "127.0.0.1:11334:11334"

  # =========================================================================
  # MAIL PLANE (Go)
  # =========================================================================
  mail-edge:
    build:
      context: .
      dockerfile: docker/Dockerfile.mail-edge
    restart: always
    ports:
      - "25:2525"   # SMTP — public inbound
    environment:
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_API_URL=http://api:4000/internal/mail/ingest
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - RSPAMD_URL=http://rspamd:11333
      - RSPAMD_PASSWORD=${RSPAMD_PASSWORD:-}
      - SPAM_REJECT_THRESHOLD=${SPAM_REJECT_THRESHOLD:-15}
      - LOG_FILE_PATH=/var/log/tempmail/mail-edge.log
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-14}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - maillogs:/var/log/tempmail
    depends_on:
      - redis
      - rspamd
      - api
    networks:
      - internal

  # =========================================================================
  # API PLANE (Go Fiber)
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    ports:
      - "127.0.0.1:4000:4000"   # Only localhost — put behind reverse proxy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - EXTERNAL_API_KEY=${EXTERNAL_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ADMIN_PANEL_PATH=${ADMIN_PANEL_PATH:-}
      - FRONTEND_URL=${FRONTEND_URL}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - LOG_FILE_PATH=/var/log/tempmail/api.log
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-14}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_ATTACHMENTS=${MAX_ATTACHMENTS:-10}
      - MAX_ATTACHMENT_SIZE_MB=${MAX_ATTACHMENT_SIZE_MB:-10}
    volumes:
      - apilogs:/var/log/tempmail
    depends_on:
      - postgres
      - redis
    networks:
      - internal

  # =========================================================================
  # BACKGROUND WORKER (Go Asynq)
  # =========================================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - LOG_FILE_PATH=/var/log/tempmail/worker.log
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-14}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - workerlogs:/var/log/tempmail
    depends_on:
      - postgres
      - redis
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  rspamd_data:
  maillogs:
  apilogs:
  workerlogs:

networks:
  internal:
    driver: bridge

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TempMail Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--card:#fff;--tx:#1a1a2e;--tx2:#6b7280;--ac:#e8590c;--ac2:#c2410c;--acbg:#fff7ed;--bd:#e5e7eb;--gn:#16a34a;--gnbg:#f0fdf4;--rd:#dc2626;--rdbg:#fef2f2;--yw:#d97706;--ywbg:#fffbeb;--bl:#2563eb;--blbg:#eff6ff;--r:10px;--sh:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);--shh:0 4px 12px rgba(0,0,0,.08)}
body{background:var(--bg);color:var(--tx);font-family:'Sarabun',sans-serif;line-height:1.6;font-size:15px}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#fff7ed 0%,#f5f6f8 50%)}
.login-box{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:2.2rem;width:100%;max-width:400px;box-shadow:var(--shh)}
.login-box h1{font-family:'Kanit',sans-serif;font-size:1.5rem;font-weight:600;text-align:center;margin-bottom:.3rem}
.login-box h1 span{color:var(--ac)}
.login-box .sub{text-align:center;color:var(--tx2);font-size:.88rem;margin-bottom:1.5rem}
.login-err{background:var(--rdbg);color:var(--rd);padding:.5rem .8rem;border-radius:6px;font-size:.84rem;margin-bottom:.8rem;display:none}
.fg{margin-bottom:1rem}
.fg label{display:block;margin-bottom:.25rem;color:var(--tx2);font-size:.82rem;font-weight:500;font-family:'Kanit',sans-serif}
.fg input{width:100%;padding:.6rem .8rem;background:var(--bg);border:1px solid var(--bd);border-radius:8px;font-size:.92rem;color:var(--tx);transition:border .15s}
.fg input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(232,89,12,.1)}
.rem{display:flex;align-items:center;gap:.4rem;margin-bottom:1rem;font-size:.84rem;color:var(--tx2)}
.rem input{accent-color:var(--ac)}
.btn-login{width:100%;padding:.65rem;background:var(--ac);color:#fff;border:none;border-radius:8px;font-family:'Kanit',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:background .15s}
.btn-login:hover{background:var(--ac2)}

/* App */
.app{display:none}.app.on{display:block}
.topbar{background:var(--card);border-bottom:1px solid var(--bd);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar h1{font-family:'Kanit',sans-serif;font-size:1.15rem;font-weight:600;color:var(--tx)}
.topbar h1 span{color:var(--ac)}
.topbar-r{display:flex;align-items:center;gap:.8rem}
.status{font-size:.78rem;color:var(--gn);display:flex;align-items:center;gap:4px}
.status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gn)}
.btn-out{padding:.35rem .7rem;background:transparent;border:1px solid var(--bd);color:var(--tx2);border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .15s}
.btn-out:hover{border-color:var(--rd);color:var(--rd)}

.main{max-width:1280px;margin:0 auto;padding:1.2rem}

/* Nav tabs */
.nav{display:flex;gap:2px;margin-bottom:1.2rem;border-bottom:1px solid var(--bd);overflow-x:auto}
.nav button{font-family:'Kanit',sans-serif;padding:.55rem 1rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);cursor:pointer;font-size:.88rem;font-weight:400;white-space:nowrap;transition:all .15s}
.nav button:hover{color:var(--tx)}
.nav button.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:500}

/* Panels */
.pn{display:none}.pn.on{display:block}

/* Stats grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.8rem;margin-bottom:1.5rem}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1rem 1.2rem;box-shadow:var(--sh);transition:box-shadow .15s}
.sc:hover{box-shadow:var(--shh)}
.sc .lb{font-size:.72rem;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;font-family:'Kanit',sans-serif;font-weight:400}
.sc .vl{font-size:1.8rem;font-weight:600;margin-top:.2rem;font-family:'Kanit',sans-serif}
.sc .vl.cac{color:var(--ac)}.sc .vl.cgn{color:var(--gn)}.sc .vl.crd{color:var(--rd)}.sc .vl.cbl{color:var(--bl)}

/* Card section */
.cd{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;box-shadow:var(--sh)}
.cd-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.cd-hd h2{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:500}

/* Search */
.sb{display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.sb input,.sb select{padding:.45rem .7rem;background:var(--bg);border:1px solid var(--bd);border-radius:7px;font-size:.86rem;color:var(--tx)}
.sb input{flex:1;min-width:200px}
.sb input:focus,.sb select:focus{outline:none;border-color:var(--ac)}
.sb .cnt{font-size:.78rem;color:var(--tx2);display:flex;align-items:center;white-space:nowrap}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{padding:.55rem .7rem;text-align:left;border-bottom:1px solid var(--bd);font-size:.85rem}
th{color:var(--tx2);font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;font-family:'Kanit',sans-serif;font-weight:500;background:var(--bg);position:sticky;top:0}
tr:hover td{background:#f9fafb}
.tbl-wrap{overflow-x:auto;max-height:65vh;overflow-y:auto}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:600}
.b-gn{background:var(--gnbg);color:var(--gn)}.b-rd{background:var(--rdbg);color:var(--rd)}.b-yw{background:var(--ywbg);color:var(--yw)}.b-bl{background:var(--blbg);color:var(--bl)}

/* Buttons */
.btn{padding:.4rem .8rem;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-family:'Kanit',sans-serif;font-weight:400;transition:all .15s}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ac2)}
.btn-d{background:var(--rdbg);color:var(--rd);border:1px solid #fecaca}.btn-d:hover{background:var(--rd);color:#fff}
.btn-s{background:var(--bg);color:var(--tx2);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--ac);color:var(--ac)}

/* Pagination */
.pg{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;font-size:.82rem;color:var(--tx2);flex-wrap:wrap;gap:.5rem}
.pg-btns{display:flex;gap:4px}
.pg-btns button{padding:.3rem .6rem;border:1px solid var(--bd);background:var(--card);border-radius:5px;cursor:pointer;font-size:.78rem;color:var(--tx2);transition:all .12s}
.pg-btns button:hover:not(:disabled){border-color:var(--ac);color:var(--ac)}
.pg-btns button:disabled{opacity:.4;cursor:default}
.pg-btns button.cur{background:var(--ac);color:#fff;border-color:var(--ac)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--card);border-radius:12px;padding:1.5rem;min-width:360px;box-shadow:var(--shh);border:1px solid var(--bd)}
.modal h3{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:500;margin-bottom:1rem}
.modal-btns{display:flex;gap:.4rem;justify-content:flex-end;margin-top:1rem}

/* Toast */
.toast{position:fixed;top:.8rem;right:.8rem;padding:.6rem 1.2rem;border-radius:8px;z-index:100;font-size:.85rem;font-weight:500;animation:sl .25s ease;box-shadow:var(--shh)}
.toast-s{background:var(--gnbg);color:var(--gn);border:1px solid #bbf7d0}
.toast-e{background:var(--rdbg);color:var(--rd);border:1px solid #fecaca}
@keyframes sl{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Empty state */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx2)}
.empty .ic{font-size:2rem;margin-bottom:.3rem}
.empty p{font-size:.88rem}

/* Loading */
.ldg{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--tx2);gap:.5rem;font-size:.88rem}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:640px){.main{padding:.8rem}.sg{grid-template-columns:1fr 1fr}.modal{min-width:auto;margin:1rem}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
<div class="login-box">
<h1><span>TempMail</span> Admin</h1>
<p class="sub">Sign in to manage your mail platform</p>
<div class="login-err" id="loginErr">Invalid admin key</div>
<form onsubmit="doLogin(event)">
<div class="fg"><label>Admin Key</label><input type="password" id="keyIn" placeholder="Enter admin key" autocomplete="current-password" autofocus></div>
<div class="rem"><input type="checkbox" id="remMe" checked><label for="remMe">Remember me</label></div>
<button type="submit" class="btn-login">Sign In</button>
</form>
</div>
</div>

<!-- APP -->
<div class="app" id="appW">
<div class="topbar">
<h1><span>TempMail</span> Admin</h1>
<div class="topbar-r">
<span class="status" id="srvStatus">Connected</span>
<button class="btn-out" onclick="logout()">Logout</button>
</div>
</div>

<div class="main">
<div class="nav">
<button class="on" onclick="tab('dash',this)">Dashboard</button>
<button onclick="tab('dom',this)">Domains</button>
<button onclick="tab('mbox',this)">Mailboxes</button>
<button onclick="tab('msg',this)">Messages</button>
<button onclick="tab('audit',this)">Audit Log</button>
<button onclick="tab('set',this)">Settings</button>
</div>

<!-- Dashboard -->
<div class="pn on" id="pn-dash"><div class="sg" id="statsG"></div></div>

<!-- Domains -->
<div class="pn" id="pn-dom">
<div class="cd"><div class="cd-hd"><h2>Domains</h2><button class="btn btn-p" onclick="openModal('addDomM')">+ Add Domain</button></div>
<div class="tbl-wrap"><table><thead><tr><th>Domain</th><th>Status</th><th>Type</th><th>Created</th><th></th></tr></thead><tbody id="domT"></tbody></table></div>
</div></div>

<!-- Mailboxes -->
<div class="pn" id="pn-mbox">
<div class="cd"><div class="cd-hd"><h2>Mailboxes</h2></div>
<div class="sb">
<input type="text" id="mboxQ" placeholder="Search address..." oninput="dSearch(loadMbox)">
<select id="mboxSt" onchange="loadMbox()"><option value="ACTIVE">Active</option><option value="">All</option><option value="DELETED">Deleted</option><option value="EXPIRED">Expired</option></select>
<span class="cnt" id="mboxCnt"></span>
</div>
<div class="tbl-wrap"><table><thead><tr><th>Address</th><th>Status</th><th>Tenant</th><th>Expires</th><th></th></tr></thead><tbody id="mboxT"></tbody></table></div>
<div class="pg" id="mboxPg"></div>
</div></div>

<!-- Messages -->
<div class="pn" id="pn-msg">
<div class="cd"><div class="cd-hd"><h2>Messages</h2></div>
<div class="sb">
<input type="text" id="msgQ" placeholder="Search from/subject..." oninput="dSearch(loadMsg)">
<span class="cnt" id="msgCnt"></span>
</div>
<div class="tbl-wrap"><table><thead><tr><th>From</th><th>Subject</th><th>Spam</th><th>Action</th><th>Received</th></tr></thead><tbody id="msgT"></tbody></table></div>
<div class="pg" id="msgPg"></div>
</div></div>

<!-- Audit -->
<div class="pn" id="pn-audit">
<div class="cd"><div class="cd-hd"><h2>Audit Log</h2></div>
<div class="tbl-wrap"><table><thead><tr><th>Action</th><th>Target</th><th>User</th><th>IP</th><th>Time</th></tr></thead><tbody id="auditT"></tbody></table></div>
<div class="pg" id="auditPg"></div>
</div></div>

<!-- Settings -->
<div class="pn" id="pn-set">
<div class="cd"><div class="cd-hd"><h2>Settings</h2></div>
<div id="setForm"></div>
<div style="margin-top:1rem"><button class="btn btn-p" onclick="saveSet()">Save Settings</button></div>
</div></div>
</div>
</div>

<!-- Add Domain Modal -->
<div class="modal-bg" id="addDomM">
<div class="modal">
<h3>Add Domain</h3>
<div class="fg"><label>Domain Name</label><input type="text" id="newDomIn" placeholder="example.com"></div>
<div class="modal-btns"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="addDom()">Add</button></div>
</div>
</div>

<script>
let KEY='';const BASE=location.origin,SK='tm_admin_key';
const PER_PAGE=30;
let mboxPage=0,msgPage=0,auditPage=0;
let _dt=null; // debounce timer

// Storage
function gk(){return localStorage.getItem(SK)||sessionStorage.getItem(SK)||''}
function sk(k,r){(r?localStorage:sessionStorage).setItem(SK,k)}
function ck(){localStorage.removeItem(SK);sessionStorage.removeItem(SK)}

// Init
(function(){const s=gk();if(s){KEY=s;verify()}})();

async function verify(){
  try{const r=await fetch(BASE+'/admin/dashboard',{headers:{'X-Admin-Key':KEY}});
  if(r.ok){showApp();loadDash()}else{ck();KEY='';showLogin()}}
  catch(e){showApp()}}

async function doLogin(e){
  e.preventDefault();const k=document.getElementById('keyIn').value.trim();if(!k)return;
  try{const r=await fetch(BASE+'/admin/dashboard',{headers:{'X-Admin-Key':k}});
  if(r.ok){KEY=k;sk(k,document.getElementById('remMe').checked);document.getElementById('loginErr').style.display='none';showApp();loadDash()}
  else{document.getElementById('loginErr').style.display='block';document.getElementById('keyIn').value='';document.getElementById('keyIn').focus()}}
  catch(e){document.getElementById('loginErr').textContent='Cannot connect to server';document.getElementById('loginErr').style.display='block'}}

function logout(){KEY='';ck();showLogin()}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('appW').classList.remove('on')}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('appW').classList.add('on')}

// API helper
async function api(p,m='GET',b=null){
  const o={method:m,headers:{'X-Admin-Key':KEY,'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(BASE+'/admin'+p,o);
  if(r.status===401||r.status===403){logout();toast('Session expired','e');throw new Error('401')}
  return r.json()}

function toast(m,t='s'){const d=document.createElement('div');d.className='toast toast-'+t;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}

// Debounce search (300ms)
function dSearch(fn){clearTimeout(_dt);_dt=setTimeout(()=>{fn(true)},300)}

// Tab switch
function tab(n,b){
  document.querySelectorAll('.nav button').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('on'));
  document.getElementById('pn-'+n).classList.add('on');if(b)b.classList.add('on');
  const ld={dash:loadDash,dom:loadDom,mbox:()=>loadMbox(true),msg:()=>loadMsg(true),audit:()=>loadAudit(true),set:loadSet};
  if(ld[n])ld[n]()}

// Format helpers
function fDate(s){if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function fTime(s){if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function fNum(n){return(n||0).toLocaleString()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Loading/empty states
function ldg(id){document.getElementById(id).innerHTML='<tr><td colspan="10"><div class="ldg"><div class="spin"></div>Loading...</div></td></tr>'}
function empty(id,msg){document.getElementById(id).innerHTML=`<tr><td colspan="10"><div class="empty"><div class="ic">📭</div><p>${msg}</p></div></td></tr>`}

// Pagination builder
function pgUI(id,page,total,perPage,fn){
  const pages=Math.ceil(total/perPage);
  if(pages<=1){document.getElementById(id).innerHTML='';return}
  const maxShow=7;let start=Math.max(0,page-3),end=Math.min(pages,start+maxShow);
  if(end-start<maxShow)start=Math.max(0,end-maxShow);
  let h=`<span>Showing ${(page*perPage+1).toLocaleString()}–${Math.min((page+1)*perPage,total).toLocaleString()} of ${total.toLocaleString()}</span><div class="pg-btns">`;
  h+=`<button ${page===0?'disabled':''} onclick="${fn}(false,0)">‹‹</button>`;
  h+=`<button ${page===0?'disabled':''} onclick="${fn}(false,${page-1})">‹</button>`;
  for(let i=start;i<end;i++){h+=`<button class="${i===page?'cur':''}" onclick="${fn}(false,${i})">${i+1}</button>`}
  h+=`<button ${page>=pages-1?'disabled':''} onclick="${fn}(false,${page+1})">›</button>`;
  h+=`<button ${page>=pages-1?'disabled':''} onclick="${fn}(false,${pages-1})">››</button></div>`;
  document.getElementById(id).innerHTML=h}

// ========== DASHBOARD ==========
async function loadDash(){
  try{const d=await api('/dashboard');
  document.getElementById('statsG').innerHTML=`
    <div class="sc"><div class="lb">Active Domains</div><div class="vl cac">${fNum(d.totalDomains)}</div></div>
    <div class="sc"><div class="lb">Active Mailboxes</div><div class="vl cgn">${fNum(d.totalMailboxes)}</div></div>
    <div class="sc"><div class="lb">Total Messages</div><div class="vl cbl">${fNum(d.totalMessages)}</div></div>
    <div class="sc"><div class="lb">Spam Blocked</div><div class="vl crd">${fNum(d.totalSpamBlocked)}</div></div>
    <div class="sc"><div class="lb">Messages Today</div><div class="vl cgn">${fNum(d.messagesToday)}</div></div>
    <div class="sc"><div class="lb">Redis Active</div><div class="vl cac">${fNum(d.redisActiveMailboxes)}</div></div>`}
  catch(e){}}

// ========== DOMAINS ==========
async function loadDom(){
  ldg('domT');
  try{const d=await api('/domains');const list=d.domains||[];
  if(!list.length){empty('domT','No domains yet');return}
  document.getElementById('domT').innerHTML=list.map(x=>`<tr>
    <td><strong>${esc(x.domainName)}</strong></td>
    <td><span class="badge ${x.status==='ACTIVE'?'b-gn':'b-rd'}">${x.status}</span></td>
    <td>${x.tenantId?'Custom':'Public'}</td>
    <td>${fDate(x.createdAt)}</td>
    <td><button class="btn btn-d" onclick="delDom('${x.id}','${esc(x.domainName)}')">Delete</button></td></tr>`).join('')}
  catch(e){}}

async function addDom(){
  const n=document.getElementById('newDomIn').value.trim();if(!n)return;
  try{await api('/domains','POST',{domainName:n});closeModal();document.getElementById('newDomIn').value='';toast('Domain added');loadDom()}
  catch(e){toast('Failed to add domain','e')}}

async function delDom(id,name){
  if(!confirm(`Delete domain "${name}" and all its mailboxes?`))return;
  try{await api('/domains/'+id,'DELETE');toast('Domain deleted');loadDom()}catch(e){}}

// ========== MAILBOXES ==========
async function loadMbox(reset,pg){
  if(reset)mboxPage=0;if(pg!==undefined)mboxPage=pg;
  const q=document.getElementById('mboxQ').value;
  const st=document.getElementById('mboxSt').value;
  ldg('mboxT');
  try{const d=await api(`/mailboxes?search=${encodeURIComponent(q)}&status=${st}&limit=${PER_PAGE}&offset=${mboxPage*PER_PAGE}`);
  const list=d.mailboxes||[];const total=d.total||0;
  document.getElementById('mboxCnt').textContent=fNum(total)+' mailboxes';
  if(!list.length){empty('mboxT','No mailboxes found');document.getElementById('mboxPg').innerHTML='';return}
  document.getElementById('mboxT').innerHTML=list.map(x=>{
    const addr=esc(x.localPart)+'@'+(x.domain?esc(x.domain.domainName):'?');
    return`<tr>
    <td><strong>${addr}</strong></td>
    <td><span class="badge ${x.status==='ACTIVE'?'b-gn':x.status==='EXPIRED'?'b-yw':'b-rd'}">${x.status}</span></td>
    <td>${esc(x.tenantId||'—')}</td>
    <td>${fTime(x.expiresAt)}</td>
    <td>${x.status==='ACTIVE'?`<button class="btn btn-d" onclick="delMbox('${x.id}')">Delete</button>`:''}</td></tr>`}).join('');
  pgUI('mboxPg',mboxPage,total,PER_PAGE,'loadMbox')}
  catch(e){}}

async function delMbox(id){
  if(!confirm('Delete this mailbox?'))return;
  try{await api('/mailboxes/'+id,'DELETE');toast('Mailbox deleted');loadMbox()}catch(e){}}

// ========== MESSAGES ==========
async function loadMsg(reset,pg){
  if(reset)msgPage=0;if(pg!==undefined)msgPage=pg;
  const q=document.getElementById('msgQ').value;
  ldg('msgT');
  try{const d=await api(`/messages?search=${encodeURIComponent(q)}&limit=${PER_PAGE}&offset=${msgPage*PER_PAGE}`);
  const list=d.messages||[];const total=d.total||0;
  document.getElementById('msgCnt').textContent=fNum(total)+' messages';
  if(!list.length){empty('msgT','No messages found');document.getElementById('msgPg').innerHTML='';return}
  document.getElementById('msgT').innerHTML=list.map(x=>{
    const spam=x.spamScore||0;const act=x.quarantineAction||'ACCEPT';
    return`<tr>
    <td>${esc(x.fromAddress||'')}</td>
    <td>${esc(x.subject||'(no subject)')}</td>
    <td><span class="badge ${spam>5?'b-rd':spam>1?'b-yw':'b-gn'}">${spam.toFixed(1)}</span></td>
    <td><span class="badge ${act==='ACCEPT'?'b-gn':'b-yw'}">${act}</span></td>
    <td>${fTime(x.receivedAt)}</td></tr>`}).join('');
  pgUI('msgPg',msgPage,total,PER_PAGE,'loadMsg')}
  catch(e){}}

// ========== AUDIT ==========
async function loadAudit(reset,pg){
  if(reset)auditPage=0;if(pg!==undefined)auditPage=pg;
  ldg('auditT');
  try{const d=await api(`/audit-log?limit=${PER_PAGE}&offset=${auditPage*PER_PAGE}`);
  const list=d.logs||[];
  if(!list.length){empty('auditT','No audit logs');document.getElementById('auditPg').innerHTML='';return}
  document.getElementById('auditT').innerHTML=list.map(x=>`<tr>
    <td><span class="badge b-bl">${esc(x.action||'')}</span></td>
    <td style="font-family:'JetBrains Mono',monospace;font-size:.78rem">${esc(x.targetId||'')}</td>
    <td>${esc(x.userId||'system')}</td>
    <td>${esc(x.ipAddress||'—')}</td>
    <td>${fTime(x.createdAt)}</td></tr>`).join('');
  const total=d.count||list.length;
  if(total>=PER_PAGE)pgUI('auditPg',auditPage,Math.max(total,(auditPage+2)*PER_PAGE),PER_PAGE,'loadAudit')}
  catch(e){}}

// ========== SETTINGS ==========
async function loadSet(){
  try{const d=await api('/settings');const s=d.settings||{};
  document.getElementById('setForm').innerHTML=Object.entries(s).map(([k,v])=>`<div class="fg">
    <label>${k.replace(/_/g,' ').toUpperCase()}</label>
    <input type="text" data-key="${k}" value="${esc(v)}"></div>`).join('')}
  catch(e){}}

async function saveSet(){
  const b={};document.querySelectorAll('#setForm input').forEach(el=>{b[el.dataset.key]=el.value});
  try{await api('/settings','POST',b);toast('Settings saved')}catch(e){toast('Failed to save','e')}}

// Modal
function openModal(id){document.getElementById(id).classList.add('on')}
function closeModal(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('on'))}
</script>

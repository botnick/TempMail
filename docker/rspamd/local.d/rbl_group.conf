# =============================================================================
# Rspamd RBL Configuration — Free Blacklists Only
# =============================================================================
# Disables blacklists that block public/Docker DNS resolvers (Spamhaus, URIBL,
# SenderScore) and replaces them with free alternatives that work reliably.
#
# These free RBLs do NOT require registration or special DNS keys.
# =============================================================================

# --- Disable problematic RBLs (require paid DNS or block public resolvers) ---
spamhaus {
    rbl = "zen.spamhaus.org";
    enabled = false;
}

spamhaus_received {
    rbl = "zen.spamhaus.org";
    enabled = false;
}

spamhaus_from {
    rbl = "zen.spamhaus.org";
    enabled = false;
}

SPAMHAUS_DBL {
    rbl = "dbl.spamhaus.org";
    enabled = false;
}

URIBL_MULTI {
    rbl = "multi.uribl.com";
    enabled = false;
}

SENDERSCORE {
    rbl = "score.senderscore.com";
    enabled = false;
}

# --- Enable free RBLs (work with any DNS resolver) ---

# SpamCop — community-driven IP blacklist (very reliable)
SPAMCOP {
    rbl = "bl.spamcop.net";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        SPAMCOP_BLOCKED = "127\\.0\\.0\\.2";
    }
    score = 4.0;
}

# SORBS — IP blacklist (comprehensive, free)
SORBS_SPAM {
    rbl = "dnsbl.sorbs.net";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        SORBS_SPAM = "127\\.0\\.0\\.[6-7]";
        SORBS_RECENT = "127\\.0\\.0\\.10";
    }
    score = 3.5;
}

# Abuseat CBL — botnet/malware detection (very accurate)
CBL_ABUSEAT {
    rbl = "cbl.abuseat.org";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        CBL_BLOCKED = "127\\.0\\.0\\.2";
    }
    score = 5.0;
}

# 0Spam — free IP blacklist
ZERO_SPAM {
    rbl = "bl.0spam.org";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        ZERO_SPAM_BLOCKED = "127\\.0\\.0\\.2";
    }
    score = 3.0;
}

# Mailspike — reputation-based blacklist
MAILSPIKE_BL {
    rbl = "bl.mailspike.net";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        MAILSPIKE_BL10 = "127\\.0\\.0\\.10";
        MAILSPIKE_BL11 = "127\\.0\\.0\\.11";
        MAILSPIKE_BL12 = "127\\.0\\.0\\.12";
    }
    score = 3.5;
}

# DNSWL — whitelist (reduces false positives)
DNSWL {
    rbl = "list.dnswl.org";
    from = true;
    received = true;
    returncodes_matcher = "regexp";
    returncodes {
        DNSWL_LOW = "127\\.0\\.[0-9]+\\.1";
        DNSWL_MED = "127\\.0\\.[0-9]+\\.2";
        DNSWL_HI = "127\\.0\\.[0-9]+\\.3";
    }
    is_whitelist = true;
    score = -3.0;
}
